<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>React.js - RocketSeat</title>
</head>

<body>
  <!-- DIV RESPONSAVEL POR RENDERIZAR A APLICAÇÃO NO REACT -->
  <div id="root"></div>

  <!-- para rodar o react de forma dinâmica -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">

    function Contador() {
      const [counter, setCounter] = React.useState(0)
        if(counter < 0) {
          alert('O contador não pode ser menor que 0')
          setCounter(0)
        }
      return (
        <>
        <p>Contador {counter}</p>
        <p>{counter > 10 ? 'Maior que 10': 'Menor ou igual a 10'}</p>
        {counter > 15 && <p>Contador é maior que 15</p>}
        <button onClick={() => setCounter(10)}> Atualizar </button>
        <button onClick={() => setCounter((prevValue) => prevValue + 1)}> Incrementar </button>
        <button onClick={() => setCounter((prevValue) => prevValue - 1)}> Decrementar </button>
        </>
      )
    }
    
    ReactDOM.createRoot(document.getElementById('root')).render(
      <>
        <Contador/>
      </>
    )
  </script>
</body>

</html>
