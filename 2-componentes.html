<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>React.js - RocketSeat</title>
</head>

<body>
  <!-- DIV RESPONSAVEL POR RENDERIZAR A APLICAÇÃO NO REACT -->
  <div id="root"></div>

  <!-- para rodar o react de forma dinâmica -->
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const Button = () => {
      return (
        <button className="px-3 py-2 bg-purple-800 rounded text-white font-bold cursor-pointer hover:bg-black">
          Botão  
        </button>
      )
    }

    const App = () => {
      return (
        <main className="flex p-3 gap-2">
          <Button/>
        </main>
      )
    }

    ReactDOM.createRoot(document.getElementById('root')).render(
      <App />
    );

  </script>
</body>

</html>
