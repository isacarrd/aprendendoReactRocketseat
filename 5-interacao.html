<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>React.js - RocketSeat</title>
</head>
<body>
  <!-- DIV RESPONSAVEL POR RENDERIZAR A APLICAÇÃO NO REACT -->
  <div id="root"></div> 

  <!-- para rodar o react de forma dinâmica -->
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    function App(){
      function alertaTela(msg){
        if(!event.target.previousSibling.value == ''){
          alert(event.target.previousSibling.value)
        } else{
          alert("Campo não pode ser vazio")
        }
      }

      function escrevendoTela(event){
        console.log(event.target.value)
      }
      return(
        <main className="m-32">
          <input 
          type="text" 
          placeholder="Digite algo" 
          className="bg-gray-400 rounded px-2" 
          onChange={escrevendoTela}
          />
          <button 
          type="button" 
          className="bg-red-800 text-white px-3 rounded-md font-bold hover:bg-black cursor-pointer" 
          onClick={alertaTela}
          >Enviar</button>
        </main>
      )
    }

    ReactDOM.createRoot(document.getElementById('root')).render(
      <App/>
    )
  </script>
</body>
</html>
